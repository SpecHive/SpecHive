global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - recording-rules.yml

# OSS-only scrape config. spechive-cloud maintains its own copy with cloud-*
# service targets — do not generalize this file for cloud.
#
# IMPORTANT: job_name must match the sanitized SERVICE_NAME (hyphens → underscores)
# used by each app's MetricsModule. Dashboard variables use label_values(up, job).
# /metrics is served on port 9464 (fixed). Changing this requires updating all of:
#   - packages/nestjs-common/src/metrics/metrics.constants.ts (METRICS_PORT)
#   - docker-compose.yml (expose: '9464')
#   - this file (scrape targets below)
scrape_configs:
  - job_name: gateway
    static_configs:
      - targets:
          - gateway:9464

  - job_name: ingestion_api
    static_configs:
      - targets:
          - ingestion-api:9464

  - job_name: worker
    static_configs:
      - targets:
          - worker:9464

  - job_name: query_api
    static_configs:
      - targets:
          - query-api:9464

  - job_name: outboxy
    static_configs:
      - targets:
          - outboxy-worker:9090
