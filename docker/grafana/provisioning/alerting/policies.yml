apiVersion: 1
policies:
  - orgId: 1
    receiver: spechive-slack
    group_by: ['alertname', 'service']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts page the on-call channel instead of the routine one.
      - receiver: spechive-slack-urgent
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
