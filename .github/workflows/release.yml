name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release-please:
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      ingestion-api-version: ${{ steps.release.outputs['apps/ingestion-api--version'] }}
      worker-version: ${{ steps.release.outputs['apps/worker--version'] }}
      query-api-version: ${{ steps.release.outputs['apps/query-api--version'] }}
      gateway-version: ${{ steps.release.outputs['apps/gateway--version'] }}
      dashboard-version: ${{ steps.release.outputs['apps/dashboard--version'] }}
      database-version: ${{ steps.release.outputs['packages/database--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  npm-publish:
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      # Layer 0: config packages (no @spechive/* dependencies)
      - name: Publish @spechive/typescript-config
        if: contains(needs.release-please.outputs.paths_released, 'packages/typescript-config')
        run: pnpm --filter @spechive/typescript-config publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/eslint-config
        if: contains(needs.release-please.outputs.paths_released, 'packages/eslint-config')
        run: pnpm --filter @spechive/eslint-config publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 1: shared-types (leaf dependency)
      - name: Publish @spechive/shared-types
        if: contains(needs.release-please.outputs.paths_released, 'packages/shared-types')
        run: pnpm --filter @spechive/shared-types publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 2: packages that depend on shared-types
      - name: Publish @spechive/reporter-core-protocol
        if: contains(needs.release-please.outputs.paths_released, 'packages/reporter-core-protocol')
        run: pnpm --filter @spechive/reporter-core-protocol publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/database
        if: contains(needs.release-please.outputs.paths_released, 'packages/database')
        run: pnpm --filter @spechive/database publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/api-types
        if: contains(needs.release-please.outputs.paths_released, 'packages/api-types')
        run: pnpm --filter @spechive/api-types publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 3: nestjs-common (depends on shared-types + database)
      - name: Publish @spechive/nestjs-common
        if: contains(needs.release-please.outputs.paths_released, 'packages/nestjs-common')
        run: pnpm --filter @spechive/nestjs-common publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 4: NestJS apps (depend on nestjs-common)
      - name: Publish @spechive/query-api
        if: contains(needs.release-please.outputs.paths_released, 'apps/query-api')
        run: pnpm --filter @spechive/query-api publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/ingestion-api
        if: contains(needs.release-please.outputs.paths_released, 'apps/ingestion-api')
        run: pnpm --filter @spechive/ingestion-api publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/worker
        if: contains(needs.release-please.outputs.paths_released, 'apps/worker')
        run: pnpm --filter @spechive/worker publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spechive/gateway
        if: contains(needs.release-please.outputs.paths_released, 'apps/gateway')
        run: pnpm --filter @spechive/gateway publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 5: playwright-reporter (bundles deps, no chain dependency)
      - name: Publish @spechive/playwright-reporter
        if: contains(needs.release-please.outputs.paths_released, 'packages/playwright-reporter')
        run: pnpm --filter @spechive/playwright-reporter publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Layer 6: dashboard
      - name: Publish @spechive/dashboard
        if: contains(needs.release-please.outputs.paths_released, 'apps/dashboard')
        run: pnpm --filter @spechive/dashboard publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: ingestion-api
            dockerfile: apps/ingestion-api/Dockerfile
            path: apps/ingestion-api
            version-key: ingestion-api-version
          - image: worker
            dockerfile: apps/worker/Dockerfile
            path: apps/worker
            version-key: worker-version
          - image: query-api
            dockerfile: apps/query-api/Dockerfile
            path: apps/query-api
            version-key: query-api-version
          - image: gateway
            dockerfile: apps/gateway/Dockerfile
            path: apps/gateway
            version-key: gateway-version
          - image: dashboard
            dockerfile: apps/dashboard/Dockerfile
            path: apps/dashboard
            version-key: dashboard-version
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL }}
          - image: migrate
            dockerfile: apps/ingestion-api/Dockerfile
            path: packages/database
            target: build
            version-key: database-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release
        id: version
        run: |
          VERSION="${{ needs.release-please.outputs[matrix.version-key] }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/spechive-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          platforms: linux/amd64,linux/arm64
          push: ${{ contains(needs.release-please.outputs.paths_released, matrix.path) || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args || '' }}
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
