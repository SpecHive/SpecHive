name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build packages for typecheck
        run: pnpm --filter './packages/*' build

      - name: Typecheck
        run: pnpm typecheck

  verify-reporter:
    name: Verify Reporter Bundle
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build reporter-client
        run: pnpm --filter @spechive/reporter-client build

      - name: Build playwright-reporter
        run: pnpm --filter @spechive/playwright-reporter build

      - name: Verify reporter bundle
        run: bash packages/playwright-reporter/scripts/verify-bundle.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spechive
          POSTGRES_PASSWORD: spechive
          POSTGRES_DB: spechive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spechive -d spechive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build reporter-client
        run: pnpm --filter @spechive/reporter-client build

      - name: Build database
        run: pnpm --filter @spechive/database build

      - name: Build nestjs-common
        run: pnpm --filter @spechive/nestjs-common build

      - name: Build api-types
        run: pnpm --filter @spechive/api-types build

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive

      - name: Run tests
        run: pnpm test:unit
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build database
        run: pnpm --filter @spechive/database build

      - name: Build nestjs-common
        run: pnpm --filter @spechive/nestjs-common build

      - name: Build api-types
        run: pnpm --filter @spechive/api-types build

      - name: Build application services
        run: |
          pnpm --filter @spechive/ingestion-api build
          pnpm --filter @spechive/worker build
          pnpm --filter @spechive/query-api build
          pnpm --filter @spechive/gateway build

      - name: Start Docker Compose stack
        run: docker compose -f .github/docker-compose.ci.yml up -d

      - name: Wait for services
        run: |
          set -e
          echo "Waiting for postgres healthy..."
          timeout 60 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T postgres pg_isready -U spechive -d spechive; do sleep 2; done'
          echo "Waiting for minio healthy..."
          timeout 60 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T minio curl -f http://127.0.0.1:9000/minio/health/live; do sleep 2; done'
          echo "Waiting for redis healthy..."
          timeout 30 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T redis redis-cli ping; do sleep 2; done'
          for svc in minio-init spechive-migrate; do
            echo "Waiting for $svc to finish..."
            cid=$(docker compose -f .github/docker-compose.ci.yml ps -aq "$svc")
            [ -n "$cid" ] || { echo "$svc container not found"; exit 1; }
            code=$(timeout 60 docker wait "$cid")
            [ "$code" = "0" ] || { echo "$svc exited with code $code"; exit 1; }
          done
          echo "All services ready."

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive

      - name: Start application services
        run: |
          PORT=3001 node apps/ingestion-api/dist/main &
          PORT=3002 node apps/worker/dist/main &
          PORT=3003 node apps/query-api/dist/main &
          PORT=3000 INGESTION_API_URL=http://localhost:3001 QUERY_API_URL=http://localhost:3003 CORS_ORIGIN=http://localhost:5173 node apps/gateway/dist/main &
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://spechive_app:spechive_app@localhost:5432/spechive
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'
          MINIO_ENDPOINT: localhost:9000
          MINIO_PUBLIC_ENDPOINT: localhost:9000
          MINIO_APP_ACCESS_KEY: spechive-app
          MINIO_APP_SECRET_KEY: spechive-app-secret-key
          MINIO_BUCKET: spechive-artifacts
          MINIO_USE_SSL: 'false'
          WORKER_URL: http://host.docker.internal:3002
          JWT_SECRET: 'ci-test-jwt-secret-minimum-64-characters-long-for-testing-only!!'
          REDIS_URL: redis://localhost:6379
          METRICS_ENABLED: 'false'

      - name: Wait for application services
        run: |
          echo "Waiting for gateway on :3000..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/health/ready; do sleep 1; done'
          echo "Waiting for ingestion-api on :3001..."
          timeout 30 bash -c 'until curl -sf http://localhost:3001/health/ready; do sleep 1; done'
          echo "Waiting for worker on :3002..."
          timeout 30 bash -c 'until curl -sf http://localhost:3002/health/ready; do sleep 1; done'
          echo "Waiting for query-api on :3003..."
          timeout 30 bash -c 'until curl -sf http://localhost:3003/health/ready; do sleep 1; done'
          echo "All application services are healthy!"

      - name: Run full integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive
          APP_DATABASE_URL: postgresql://spechive_app:spechive_app@localhost:5432/spechive
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'
          JWT_SECRET: 'ci-test-jwt-secret-minimum-64-characters-long-for-testing-only!!'
          MINIO_ENDPOINT: localhost:9000
          MINIO_PUBLIC_ENDPOINT: localhost:9000
          MINIO_APP_ACCESS_KEY: spechive-app
          MINIO_APP_SECRET_KEY: spechive-app-secret-key
          MINIO_BUCKET: spechive-artifacts
          MINIO_USE_SSL: 'false'
          POSTGRES_CONTAINER: spechive-ci-postgres-1
          GATEWAY_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose -f .github/docker-compose.ci.yml logs --no-color --timestamps minio-init || true
          docker compose -f .github/docker-compose.ci.yml logs --no-color --timestamps minio || true
          docker compose -f .github/docker-compose.ci.yml logs --no-color --timestamps postgres || true
          docker compose -f .github/docker-compose.ci.yml ps -a || true

      - name: Cleanup Docker Compose stack
        if: always()
        run: docker compose -f .github/docker-compose.ci.yml down -v

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ingestion-api
            dockerfile: apps/ingestion-api/Dockerfile
          - image: worker
            dockerfile: apps/worker/Dockerfile
          - image: dashboard
            dockerfile: apps/dashboard/Dockerfile
            build_args: VITE_API_URL=http://localhost:3000
          - image: query-api
            dockerfile: apps/query-api/Dockerfile
          - image: gateway
            dockerfile: apps/gateway/Dockerfile
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
