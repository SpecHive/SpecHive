name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build packages for typecheck
        run: pnpm --filter './packages/*' build

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm -r run build

  verify-reporter:
    name: Verify Reporter Bundle
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build playwright-reporter
        run: pnpm --filter @spechive/playwright-reporter build

      - name: Verify reporter bundle
        run: bash packages/playwright-reporter/scripts/verify-bundle.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spechive
          POSTGRES_PASSWORD: spechive
          POSTGRES_DB: spechive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spechive -d spechive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build database
        run: pnpm --filter @spechive/database build

      - name: Build nestjs-common
        run: pnpm --filter @spechive/nestjs-common build

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create extensions and roles (mirrors docker/postgres/init.sh)
        run: |
          psql "$DATABASE_URL" -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";

            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'spechive_app') THEN
                CREATE ROLE spechive_app LOGIN PASSWORD 'spechive_app';
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE spechive TO spechive_app;
            GRANT USAGE ON SCHEMA public TO spechive_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO spechive_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO spechive_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO spechive_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO spechive_app;

            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'outboxy') THEN
                CREATE ROLE outboxy LOGIN PASSWORD 'outboxy';
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE spechive TO outboxy;
            GRANT USAGE ON SCHEMA public TO outboxy;
          "
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @spechive/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @spechive/reporter-core-protocol build

      - name: Build database
        run: pnpm --filter @spechive/database build

      - name: Start Docker Compose stack
        run: docker compose -f .github/docker-compose.ci.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres to be healthy..."
          timeout 60 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T postgres pg_isready -U spechive -d spechive; do sleep 2; done'
          echo "Waiting for minio to be healthy..."
          timeout 60 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T minio curl -f http://127.0.0.1:9000/minio/health/live; do sleep 2; done'
          echo "Waiting for outboxy-api to be healthy..."
          timeout 60 bash -c 'until docker compose -f .github/docker-compose.ci.yml exec -T outboxy-api wget -qO- http://127.0.0.1:3100/health; do sleep 2; done'
          echo "All services are healthy!"

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive

      - name: Run full integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://spechive:spechive@localhost:5432/spechive
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'
          MINIO_ENDPOINT: localhost:9000
          MINIO_APP_ACCESS_KEY: spechive-app
          MINIO_APP_SECRET_KEY: spechive-app-secret-key
          MINIO_BUCKET: spechive-artifacts
          MINIO_USE_SSL: 'false'
          OUTBOXY_API_URL: http://localhost:3100

      - name: Cleanup Docker Compose stack
        if: always()
        run: docker compose -f .github/docker-compose.ci.yml down -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ingestion-api/Dockerfile
          push: false
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=ingestion-api
          cache-to: type=gha,scope=ingestion-api,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: false
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

      - name: Build query-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/query-api/Dockerfile
          push: false
          secrets: npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha,scope=query-api
          cache-to: type=gha,scope=query-api,mode=max
