name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=critical

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm -r run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: assertly
          POSTGRES_PASSWORD: assertly
          POSTGRES_DB: assertly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assertly -d assertly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @assertly/shared-types build

      - name: Build reporter-core-protocol
        run: pnpm --filter @assertly/reporter-core-protocol build

      - name: Build database
        run: pnpm --filter @assertly/database build

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://assertly:assertly@localhost:5432/assertly

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create assertly_app role
        run: |
          psql "$DATABASE_URL" -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'assertly_app') THEN
                CREATE ROLE assertly_app LOGIN PASSWORD 'assertly_app';
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE assertly TO assertly_app;
            GRANT USAGE ON SCHEMA public TO assertly_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO assertly_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO assertly_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO assertly_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO assertly_app;
          "
        env:
          DATABASE_URL: postgresql://assertly:assertly@localhost:5432/assertly

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://assertly:assertly@localhost:5432/assertly
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'

      - name: Run integration tests
        run: pnpm test:integration:db
        env:
          DATABASE_URL: postgresql://assertly:assertly@localhost:5432/assertly
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'

      # TODO: Enable when a dedicated CI job with Docker Compose services is available
      - name: Run full integration tests
        if: false
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://assertly:assertly@localhost:5432/assertly
          WEBHOOK_SECRET: 'ci-test-webhook-secret-minimum-32-chars!!'
          TOKEN_HASH_KEY: 'ci-test-token-hash-key-minimum-32-chars!!'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DOCKER_BUILDKIT: '1'
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ingestion-api image
        run: docker build --secret id=npm_token,env=NPM_TOKEN -f apps/ingestion-api/Dockerfile .

      - name: Build worker image
        run: docker build --secret id=npm_token,env=NPM_TOKEN -f apps/worker/Dockerfile .

      - name: Build dashboard image
        run: docker build --secret id=npm_token,env=NPM_TOKEN -f apps/dashboard/Dockerfile .
