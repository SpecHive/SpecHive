name: spechive-ci

networks:
  spechive-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - spechive-network
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_USER: spechive
      POSTGRES_PASSWORD: spechive
      POSTGRES_DB: spechive
      SPECHIVE_APP_PASSWORD: spechive_app
      OUTBOXY_PASSWORD: outboxy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spechive -d spechive']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    networks:
      - spechive-network
    ports:
      - '9000:9000'
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    networks:
      - spechive-network
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: spechive-artifacts
      MINIO_APP_ACCESS_KEY: spechive-app
      MINIO_APP_SECRET_KEY: spechive-app-secret-key
    entrypoint: ['/bin/sh', '/init.sh']
    restart: 'no'

  outboxy-migrate:
    image: ghcr.io/outboxy/outboxy:v1.0.0
    networks:
      - spechive-network
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://spechive:spechive@postgres:5432/spechive

  outboxy-api:
    image: ghcr.io/outboxy/outboxy:v1.0.0
    networks:
      - spechive-network
    ports:
      - '3100:3100'
    command: api
    environment:
      DATABASE_URL: postgres://outboxy:outboxy@postgres:5432/spechive
      PORT: '3100'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3100/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      outboxy-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  outboxy-worker:
    image: ghcr.io/outboxy/outboxy:v1.0.0
    networks:
      - spechive-network
    command: worker
    environment:
      DATABASE_URL: postgres://outboxy:outboxy@postgres:5432/spechive
      PUBLISHER_TYPE: http
      PUBLISHER_HTTP_DEFAULT_URL: http://worker:3001/webhooks/outboxy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "outboxy" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      outboxy-migrate:
        condition: service_completed_successfully
