name: Feature request
description: Suggest a new feature or improvement for SpecHive
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve — we want to understand the use case before jumping to solutions.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What are you trying to do, and what's getting in the way?
      placeholder: When triaging flaky tests, I can't easily see which CI jobs a given test failed on...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have an idea for how to solve it, describe it here. Otherwise leave blank.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or tried, and why they didn't work.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or other context that helps us understand the request.
    validations:
      required: false
