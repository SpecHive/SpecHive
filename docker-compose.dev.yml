name: spechive

# Development overrides: Docker-internal networking, host ports, hot reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

secrets:
  npm_token:
    environment: NPM_TOKEN

services:
  postgres:
    # Add non-internal network so Docker can publish the port to the host.
    # The base compose puts postgres only on the `internal` (internal: true)
    # network, which silently blocks host port-mapping.
    networks:
      - internal
      - spechive-network
    ports:
      - '5432:5432'

  minio:
    networks:
      - internal
      - spechive-network
    ports:
      - '9000:9000'
      - '9001:9001'

  redis:
    networks:
      - internal
      - spechive-network
    ports:
      - '6379:6379'

  # Docker-internal networking overrides — base compose uses .env values (localhost),
  # these override with Docker service names for container-to-container communication.

  ingestion-api:
    networks:
      - internal
      - spechive-network
    ports:
      - '3001:3001'
    read_only: false
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
      target: development
      secrets:
        - npm_token
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://spechive_app:${SPECHIVE_APP_PASSWORD:?SPECHIVE_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      MINIO_ENDPOINT: minio:9000
      WORKER_URL: http://worker:3002
      METRICS_ENABLED: 'true'
      SERVICE_NAME: ingestion-api
      LOKI_HOST: http://loki:3100
    command: ['sh', '-c', 'node_modules/.bin/nest start --watch']
    volumes:
      - ./apps/ingestion-api/src:/app/apps/ingestion-api/src:ro
      - ./packages:/app/packages:ro

  worker:
    networks:
      - internal
      - spechive-network
    ports:
      - '3002:3002'
    read_only: false
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: development
      secrets:
        - npm_token
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://spechive_app:${SPECHIVE_APP_PASSWORD:?SPECHIVE_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      MINIO_ENDPOINT: minio:9000
      REDIS_URL: redis://redis:6379
      METRICS_ENABLED: 'true'
      SERVICE_NAME: worker
      LOKI_HOST: http://loki:3100
    command: ['sh', '-c', 'node_modules/.bin/nest start --watch']
    volumes:
      - ./apps/worker/src:/app/apps/worker/src:ro
      - ./packages:/app/packages:ro

  query-api:
    networks:
      - internal
      - spechive-network
    ports:
      - '3003:3003'
    read_only: false
    build:
      context: .
      dockerfile: apps/query-api/Dockerfile
      target: development
      secrets:
        - npm_token
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://spechive_app:${SPECHIVE_APP_PASSWORD:?SPECHIVE_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      MINIO_ENDPOINT: minio:9000
      REDIS_URL: redis://redis:6379
      METRICS_ENABLED: 'true'
      SERVICE_NAME: query-api
      LOKI_HOST: http://loki:3100
    command: ['sh', '-c', 'node_modules/.bin/nest start --watch']
    volumes:
      - ./apps/query-api/src:/app/apps/query-api/src:ro
      - ./packages:/app/packages:ro

  gateway:
    ports:
      - '3000:3000'
    read_only: false
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      target: development
      secrets:
        - npm_token
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://spechive_app:${SPECHIVE_APP_PASSWORD:?SPECHIVE_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      CORS_ORIGIN: http://localhost:5173
      INGESTION_API_URL: http://ingestion-api:3001
      QUERY_API_URL: http://query-api:3003
      METRICS_ENABLED: 'true'
      SERVICE_NAME: gateway
      LOKI_HOST: http://loki:3100
    command: ['sh', '-c', 'node_modules/.bin/nest start --watch']
    volumes:
      - ./apps/gateway/src:/app/apps/gateway/src:ro
      - ./packages:/app/packages:ro

  outboxy-worker:
    environment:
      DATABASE_URL: postgres://outboxy:${OUTBOXY_PASSWORD:?OUTBOXY_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}

  dashboard:
    ports:
      - '5173:8080'
    read_only: false
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      target: development
      secrets:
        - npm_token
    environment:
      NODE_ENV: development
    command: ['node_modules/.bin/vite', '--host', '0.0.0.0', '--port', '8080']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./apps/dashboard/src:/app/apps/dashboard/src:ro
      - ./apps/dashboard/public:/app/apps/dashboard/public:ro
      - ./apps/dashboard/index.html:/app/apps/dashboard/index.html:ro
      - ./packages:/app/packages:ro

  loki:
    ports:
      - '3101:3100'
    networks:
      - internal
      - spechive-network

  prometheus:
    ports:
      - '9090:9090'
    networks:
      - internal
      - spechive-network

  grafana:
    ports:
      - '3100:3000'
    networks:
      - internal
      - spechive-network
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      SLACK_WEBHOOK_URL: http://localhost:9999/dev-null
      SLACK_URGENT_WEBHOOK_URL: http://localhost:9999/dev-null
