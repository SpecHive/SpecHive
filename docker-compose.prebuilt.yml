# docker-compose.prebuilt.yml — Override file using pre-built images from GHCR
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml up -d
#
# This replaces local builds with published container images.
# Requires: docker login ghcr.io

services:
  assertly-migrate:
    image: ghcr.io/assertly-dev/assertly-migrate:latest
    build: !reset null

  ingestion-api:
    image: ghcr.io/assertly-dev/assertly-ingestion-api:latest
    build: !reset null

  worker:
    image: ghcr.io/assertly-dev/assertly-worker:latest
    build: !reset null

  query-api:
    image: ghcr.io/assertly-dev/assertly-query-api:latest
    build: !reset null

  dashboard:
    image: ghcr.io/assertly-dev/assertly-dashboard:latest
    build: !reset null
