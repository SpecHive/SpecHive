# docker-compose.prebuilt.yml — Override file using pre-built images from GHCR
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml up -d
#
# This replaces local builds with published container images.
# Requires: docker login ghcr.io

services:
  spechive-migrate:
    image: ghcr.io/spechive-dev/spechive-migrate:latest
    build: !reset null

  ingestion-api:
    image: ghcr.io/spechive-dev/spechive-ingestion-api:latest
    build: !reset null

  worker:
    image: ghcr.io/spechive-dev/spechive-worker:latest
    build: !reset null

  query-api:
    image: ghcr.io/spechive-dev/spechive-query-api:latest
    build: !reset null

  dashboard:
    image: ghcr.io/spechive-dev/spechive-dashboard:latest
    build: !reset null

  prometheus:
    image: ghcr.io/spechive/spechive-prometheus:latest
    build: !reset null

  loki:
    image: ghcr.io/spechive/spechive-loki:latest
    build: !reset null

  grafana:
    image: ghcr.io/spechive/spechive-grafana:latest
    build: !reset null
