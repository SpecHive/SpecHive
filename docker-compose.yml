# Pre-built images: use `docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml up -d`
# to pull from GHCR instead of building locally.

name: spechive

networks:
  spechive-network:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  minio-data:

secrets:
  npm_token:
    environment: NPM_TOKEN

# ---------------------------------------------------------------------------
# Shared environment blocks (merged via <<: *anchor)
# ---------------------------------------------------------------------------

x-minio-env: &minio-env
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT is required}
  MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:?MINIO_APP_ACCESS_KEY is required}
  MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:?MINIO_APP_SECRET_KEY is required}
  MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
  MINIO_USE_SSL: ${MINIO_USE_SSL:?MINIO_USE_SSL is required}
  S3_REGION: ${S3_REGION:?S3_REGION is required}

x-app-security: &app-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy volatile-lru --save ""
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    networks:
      - internal
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    networks:
      - internal
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:?MINIO_APP_ACCESS_KEY is required}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:?MINIO_APP_SECRET_KEY is required}
    entrypoint: ['/bin/sh', '/init.sh']
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Outboxy (transactional outbox) — Docker-only service, uses Docker hostnames
  # ---------------------------------------------------------------------------

  outboxy-worker:
    image: ghcr.io/outboxy/outboxy:v1.0.0
    restart: unless-stopped
    networks:
      - internal
    command: worker
    environment:
      DATABASE_URL: postgres://outboxy:${OUTBOXY_PASSWORD:?OUTBOXY_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      PUBLISHER_TYPE: http
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "outboxy" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      spechive-migrate:
        condition: service_completed_successfully
      worker:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Database migration — Docker-only service, uses Docker hostnames
  # ---------------------------------------------------------------------------

  spechive-migrate:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
      target: build
      secrets:
        - npm_token
    networks:
      - internal
    command: ['node', 'packages/database/dist/migrate.js']
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SPECHIVE_APP_PASSWORD: ${SPECHIVE_APP_PASSWORD:?SPECHIVE_APP_PASSWORD is required}
      OUTBOXY_PASSWORD: ${OUTBOXY_PASSWORD:?OUTBOXY_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Application services — all env vars from .env
  # ---------------------------------------------------------------------------

  ingestion-api:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - internal
    <<: *app-security
    environment:
      <<: *minio-env
      NODE_ENV: production
      PORT: '3001'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      WORKER_URL: ${WORKER_URL:?WORKER_URL is required}
      TOKEN_HASH_KEY: ${TOKEN_HASH_KEY:?TOKEN_HASH_KEY is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      spechive-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - internal
    <<: *app-security
    environment:
      <<: *minio-env
      NODE_ENV: production
      PORT: '3002'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      ARTIFACT_RETENTION_DAYS: ${ARTIFACT_RETENTION_DAYS:?ARTIFACT_RETENTION_DAYS is required}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      spechive-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  query-api:
    build:
      context: .
      dockerfile: apps/query-api/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - internal
    <<: *app-security
    environment:
      <<: *minio-env
      NODE_ENV: production
      PORT: '3003'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:?JWT_ACCESS_EXPIRES_IN is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:?JWT_REFRESH_EXPIRES_IN is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3003/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      spechive-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - spechive-network
      - internal
    <<: *app-security
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      INGESTION_API_URL: ${INGESTION_API_URL:?INGESTION_API_URL is required}
      QUERY_API_URL: ${QUERY_API_URL:?QUERY_API_URL is required}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      ingestion-api:
        condition: service_healthy
      query-api:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - spechive-network
    <<: *app-security
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    environment:
      VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
