name: assertly

networks:
  assertly-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - assertly-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: assertly
      POSTGRES_PASSWORD: assertly
      POSTGRES_DB: assertly
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assertly -d assertly']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    networks:
      - assertly-network
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    networks:
      - assertly-network
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: ['/bin/sh', '/init.sh']
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Outboxy (transactional outbox)
  # ---------------------------------------------------------------------------

  outboxy-api:
    image: ghcr.io/outboxy/outboxy:1.3.0
    restart: unless-stopped
    networks:
      - assertly-network
    command: api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://assertly:assertly@postgres:5432/assertly}
      PORT: '3100'
    depends_on:
      postgres:
        condition: service_healthy

  outboxy-worker:
    image: ghcr.io/outboxy/outboxy:1.3.0
    restart: unless-stopped
    networks:
      - assertly-network
    command: worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://assertly:assertly@postgres:5432/assertly}
      PUBLISHER_TYPE: http
      PUBLISHER_HTTP_DEFAULT_URL: http://worker:3001/webhooks/outboxy
    depends_on:
      outboxy-api:
        condition: service_started
      worker:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  ingestion-api:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
    restart: unless-stopped
    networks:
      - assertly-network
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://assertly:assertly@postgres:5432/assertly}
      PORT: '3000'
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      WORKER_WEBHOOK_URL: ${WORKER_WEBHOOK_URL:-http://worker:3001/webhooks/outboxy}
      OUTBOXY_API_URL: ${OUTBOXY_API_URL:-http://outboxy-api:3100}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      outboxy-api:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    networks:
      - assertly-network
    environment:
      NODE_ENV: production
      PORT: '3001'
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-in-production}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    networks:
      - assertly-network
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5173/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      ingestion-api:
        condition: service_healthy
