name: assertly

networks:
  assertly-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:

secrets:
  npm_token:
    environment: NPM_TOKEN

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - assertly-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assertly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-assertly}
      ASSERTLY_APP_PASSWORD: ${ASSERTLY_APP_PASSWORD:-assertly_app}
      OUTBOXY_PASSWORD: ${OUTBOXY_PASSWORD:-outboxy}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-assertly} -d ${POSTGRES_DB:-assertly}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    networks:
      - assertly-network
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    networks:
      - assertly-network
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-assertly-artifacts}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:-assertly-app}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:-assertly-app-secret-key}
    entrypoint: ['/bin/sh', '/init.sh']
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Outboxy (transactional outbox)
  # ---------------------------------------------------------------------------
  outboxy-migrate:
    image: ghcr.io/outboxy/outboxy:v0.4.0
    restart: on-failure
    networks:
      - assertly-network
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-assertly}:${POSTGRES_PASSWORD:-assertly}@postgres:5432/${POSTGRES_DB:-assertly}

  outboxy-api:
    image: ghcr.io/outboxy/outboxy:v0.4.0
    restart: unless-stopped
    networks:
      - assertly-network
    command: api
    environment:
      DATABASE_URL: postgres://outboxy:${OUTBOXY_PASSWORD:-outboxy}@postgres:5432/${POSTGRES_DB:-assertly}
      PORT: '3100'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3100/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      outboxy-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  outboxy-worker:
    image: ghcr.io/outboxy/outboxy:v0.4.0
    restart: unless-stopped
    networks:
      - assertly-network
    command: worker
    environment:
      DATABASE_URL: postgres://outboxy:${OUTBOXY_PASSWORD:-outboxy}@postgres:5432/${POSTGRES_DB:-assertly}
      PUBLISHER_TYPE: http
      PUBLISHER_HTTP_DEFAULT_URL: http://worker:3001/webhooks/outboxy
    healthcheck:
      # Outboxy worker is a background poller with no HTTP endpoint.
      # Process check is the best available option.
      test: ['CMD-SHELL', 'pgrep -f "outboxy" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      outboxy-migrate:
        condition: service_completed_successfully
      worker:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Database migration (runs once before application services start)
  # ---------------------------------------------------------------------------

  assertly-migrate:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
      target: build
      secrets:
        - npm_token
    networks:
      - assertly-network
    command: ['node', 'packages/database/dist/migrate.js']
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-assertly}:${POSTGRES_PASSWORD:-assertly}@postgres:5432/${POSTGRES_DB:-assertly}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # Revoke application table access from the outboxy role after migrations create them.
  restrict-outboxy:
    image: postgres:16-alpine
    networks:
      - assertly-network
    volumes:
      - ./docker/postgres/restrict-outboxy.sh:/restrict-outboxy.sh:ro
    entrypoint: ['sh', '/restrict-outboxy.sh']
    environment:
      PGHOST: postgres
      PGPORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-assertly}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-assertly}
    depends_on:
      assertly-migrate:
        condition: service_completed_successfully
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  ingestion-api:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - assertly-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://assertly_app:${ASSERTLY_APP_PASSWORD:-assertly_app}@postgres:5432/${POSTGRES_DB:-assertly}
      PORT: '3000'
      CORS_ORIGIN: ${CORS_ORIGIN:-http://dashboard:8080}
      WORKER_WEBHOOK_URL: http://worker:3001/webhooks/outboxy
      OUTBOXY_API_URL: http://outboxy-api:3100
      TOKEN_HASH_KEY: ${TOKEN_HASH_KEY:?TOKEN_HASH_KEY is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:-assertly-app}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:-assertly-app-secret-key}
      MINIO_BUCKET: ${MINIO_BUCKET:-assertly-artifacts}
      MINIO_USE_SSL: '${MINIO_USE_SSL:-false}'
      S3_REGION: ${S3_REGION:-us-east-1}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      restrict-outboxy:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      outboxy-api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - assertly-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      NODE_ENV: production
      PORT: '3001'
      DATABASE_URL: postgres://assertly_app:${ASSERTLY_APP_PASSWORD:-assertly_app}@postgres:5432/${POSTGRES_DB:-assertly}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:-assertly-app}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:-assertly-app-secret-key}
      MINIO_BUCKET: ${MINIO_BUCKET:-assertly-artifacts}
      MINIO_USE_SSL: '${MINIO_USE_SSL:-false}'
      S3_REGION: ${S3_REGION:-us-east-1}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      restrict-outboxy:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      outboxy-api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  query-api:
    build:
      context: .
      dockerfile: apps/query-api/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - assertly-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://assertly_app:${ASSERTLY_APP_PASSWORD:-assertly_app}@postgres:5432/${POSTGRES_DB:-assertly}
      PORT: '3002'
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://dashboard:8080}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:-assertly-app}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:-assertly-app-secret-key}
      MINIO_BUCKET: ${MINIO_BUCKET:-assertly-artifacts}
      MINIO_USE_SSL: '${MINIO_USE_SSL:-false}'
      S3_REGION: ${S3_REGION:-us-east-1}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      restrict-outboxy:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - assertly-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3002}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      query-api:
        condition: service_healthy
